name: Publish to NuGet

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Ensure we see results for all platforms
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Pack and Install Tool Locally
      shell: pwsh
      run: |
        dotnet build Opener/Opener.csproj -c Release
        dotnet pack Opener/Opener.csproj -c Release -o ./nupkg --no-build
        dotnet tool install --global --add-source ./nupkg com.chirravuris.opener
    
    - name: Add Tool to Path (Windows)
      if: runner.os == 'Windows'
      run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
    - name: Add Tool to Path (Linux/macOS)
      if: runner.os != 'Windows'
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Run Integration Tests
      shell: pwsh
      run: ./tests/integration_test.ps1

  publish:
    needs: integration-tests
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore and Test (Unit)
      run: |
        dotnet restore Opener.sln
        dotnet test Opener.sln --configuration Release --verbosity normal

    - name: Derive Package Version from Tag
      shell: pwsh
      run: |
        $version = $env:GITHUB_REF_NAME
        if ($version.StartsWith('v')) {
          $version = $version.Substring(1)
        }

        if ([string]::IsNullOrWhiteSpace($version)) {
          throw 'Unable to determine package version from tag.'
        }

        "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Pack
      run: dotnet pack Opener.sln --configuration Release --output ${{ github.workspace }}/nupkgs /p:Version=${{ env.PACKAGE_VERSION }}

    - name: Push to NuGet
      run: |
        dotnet nuget push "${{ github.workspace }}\nupkgs\*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
