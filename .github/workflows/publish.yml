name: Publish to NuGet

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration-tests:
    name: Integration Test (.NET ${{ matrix.dotnet-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Ensure we see results for all platforms and versions
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['8.0.x', '10.0.x']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Run Unit Tests
      run: dotnet test Opener.Tests/Opener.Tests.csproj -c Release --verbosity normal

    - name: Pack and Install Tool Locally
      shell: pwsh
      run: |
        dotnet build Opener/Opener.csproj -c Release
        dotnet pack Opener/Opener.csproj -c Release -o ./nupkg --no-build
        dotnet tool install --global --add-source ./nupkg com.chirravuris.opener
    
    - name: Add Tool to Path (Windows)
      if: runner.os == 'Windows'
      run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
    - name: Add Tool to Path (Linux/macOS)
      if: runner.os != 'Windows'
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Run Integration Tests
      shell: pwsh
      run: ./tests/integration_test.ps1

  build:
    needs: integration-tests
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore
      run: dotnet restore Opener.sln

    - name: Run Unit Tests
      run: dotnet test Opener.Tests/Opener.Tests.csproj -c Release --verbosity normal

    - name: Build
      run: dotnet build Opener.sln --configuration Release --no-restore

    - name: Run Integration Tests
      shell: pwsh
      run: ./tests/integration_test.ps1

  publish:
    needs: integration-tests
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Derive Package Version from Tag
      shell: pwsh
      run: |
        $version = $env:GITHUB_REF_NAME
        if ($version.StartsWith('v')) {
          $version = $version.Substring(1)
        }

        if ([string]::IsNullOrWhiteSpace($version)) {
          throw 'Unable to determine package version from tag.'
        }

        "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Extract Release Notes from CHANGELOG
      shell: pwsh
      run: |
        $version = $env:PACKAGE_VERSION
        $changelogPath = Join-Path $env:GITHUB_WORKSPACE 'CHANGELOG.md'
        $outputPath = Join-Path $env:GITHUB_WORKSPACE 'release-notes.md'
        $content = Get-Content $changelogPath -Raw
        $pattern = "(?s)## \[$([regex]::Escape($version))\].*?(?=\r?\n## \[|\z)"
        $match = [regex]::Match($content, $pattern)

        if (-not $match.Success) {
          throw "Release notes for version $version were not found in CHANGELOG.md."
        }

        $notes = $match.Value.Trim()
        $notes | Out-File -FilePath $outputPath -Encoding utf8

    - name: Restore
      run: dotnet restore Opener.sln

    - name: Build
      run: dotnet build Opener.sln --configuration Release --no-restore /p:Version=${{ env.PACKAGE_VERSION }}

    - name: Pack
      shell: pwsh
      run: |
        if (Test-Path ./nupkg) {
          Remove-Item ./nupkg -Recurse -Force
        }

        dotnet pack Opener.sln --configuration Release --output ./nupkg --no-build /p:Version=$env:PACKAGE_VERSION

    - name: Push to NuGet
      shell: pwsh
      run: |
        $packages = Get-ChildItem ./nupkg -Filter *.nupkg
        if ($packages.Count -eq 0) {
          throw 'No NuGet packages were found in ./nupkg.'
        }

        foreach ($package in $packages) {
          dotnet nuget push $package.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
        }
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ env.PACKAGE_VERSION }}
        body_path: release-notes.md
        draft: false
        prerelease: false
