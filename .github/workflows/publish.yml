name: Publish to NuGet

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration-tests:
    name: Integration Test (.NET ${{ matrix.dotnet-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Ensure we see results for all platforms and versions
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['8.0.x', '10.0.x']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Run Unit Tests
      run: dotnet test Opener.Tests/Opener.Tests.csproj -c Release --verbosity normal

    - name: Pack and Install Tool Locally
      shell: pwsh
      run: |
        if (Test-Path ./nupkg) {
          Remove-Item ./nupkg -Recurse -Force
        }

        $toolPath = Join-Path $env:GITHUB_WORKSPACE '.tools'
        if (Test-Path $toolPath) {
          Remove-Item $toolPath -Recurse -Force
        }

        dotnet build Opener/Opener.csproj -c Release
        dotnet pack Opener/Opener.csproj -c Release -o ./nupkg --no-build
        dotnet tool install --tool-path $toolPath --add-source ./nupkg com.chirravuris.opener

        $commandName = if ($IsWindows) { 'o.exe' } else { 'o' }
        $commandPath = Join-Path $toolPath $commandName
        "OPENER_COMMAND=$commandPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Run Integration Tests
      shell: pwsh
      run: ./tests/integration_test.ps1 -OpenerCommand $env:OPENER_COMMAND

  build:
    needs: integration-tests
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore
      run: dotnet restore Opener.sln

    - name: Run Unit Tests
      run: dotnet test Opener.Tests/Opener.Tests.csproj -c Release --verbosity normal

    - name: Build
      run: dotnet build Opener.sln --configuration Release --no-restore

  build-binaries:
    name: Build AOT Binary (${{ matrix.rid }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive_name: opener-linux-x64.tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            archive_name: opener-linux-arm64.tar.gz
          - os: windows-latest
            rid: win-x64
            archive_name: opener-windows-x64.zip
          - os: windows-latest
            rid: win-arm64
            archive_name: opener-windows-arm64.zip
          - os: macos-latest
            rid: osx-x64
            archive_name: opener-darwin-x64.tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive_name: opener-darwin-arm64.tar.gz

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Install dependencies (Linux x64)
      if: matrix.rid == 'linux-x64'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang zlib1g-dev

    - name: Install dependencies (Linux arm64)
      if: matrix.rid == 'linux-arm64'
      run: |
        sudo dpkg --add-architecture arm64
        
        # Configure APT to use ports.ubuntu.com for arm64 packages
        if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
          sudo sed -i 's/Types: deb/Types: deb\nArchitectures: amd64/g' /etc/apt/sources.list.d/ubuntu.sources
          echo "Types: deb" | sudo tee /etc/apt/sources.list.d/arm64-ports.sources
          echo "URIs: http://ports.ubuntu.com/ubuntu-ports" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.sources
          echo "Suites: noble noble-updates noble-backports noble-security" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.sources
          echo "Components: main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.sources
          echo "Architectures: arm64" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.sources
        else
          sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
          sudo sed -i 's/deb-src http/deb-src [arch=amd64] http/g' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-backports main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
        fi
        
        sudo apt-get update
        sudo apt-get install -y clang llvm binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu zlib1g-dev:arm64

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install llvm

    - name: Build AOT binary
      shell: pwsh
      run: |
        $extraParams = @()
        if ("${{ matrix.rid }}" -eq "linux-arm64") {
            $extraParams += "-p:CppLinkerName=aarch64-linux-gnu-gcc"
        }
        
        dotnet publish Opener/Opener.csproj `
          -c Release `
          -f net10.0 `
          -r ${{ matrix.rid }} `
          --self-contained `
          -p:PublishAot=true `
          @extraParams `
          -o "./publish-aot"

    - name: Package Binary (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Rename-Item -Path "./publish-aot/Opener.exe" -NewName "o.exe"
        Compress-Archive -Path "./publish-aot/o.exe" -DestinationPath "./${{ matrix.archive_name }}"

    - name: Package Binary (Unix)
      if: runner.os != 'Windows'
      run: |
        mv ./publish-aot/Opener ./publish-aot/o
        chmod +x ./publish-aot/o
        tar -czf "./${{ matrix.archive_name }}" -C "./publish-aot" o

    - name: Upload Packaged Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.archive_name }}
        path: ./${{ matrix.archive_name }}
        retention-days: 2

  publish:
    needs: [integration-tests, build-binaries]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Derive Package Version from Tag
      shell: pwsh
      run: |
        $version = $env:GITHUB_REF_NAME
        if ($version.StartsWith('v')) {
          $version = $version.Substring(1)
        }

        if ([string]::IsNullOrWhiteSpace($version)) {
          throw 'Unable to determine package version from tag.'
        }

        "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Extract Release Notes from CHANGELOG
      shell: pwsh
      run: |
        $version = $env:PACKAGE_VERSION
        $changelogPath = Join-Path $env:GITHUB_WORKSPACE 'CHANGELOG.md'
        $outputPath = Join-Path $env:GITHUB_WORKSPACE 'release-notes.md'
        $content = Get-Content $changelogPath -Raw
        $pattern = "(?s)## \[$([regex]::Escape($version))\].*?(?=\r?\n## \[|\z)"
        $match = [regex]::Match($content, $pattern)

        if (-not $match.Success) {
          throw "Release notes for version $version were not found in CHANGELOG.md."
        }

        $notes = $match.Value.Trim()
        $notes | Out-File -FilePath $outputPath -Encoding utf8

    - name: Restore
      run: dotnet restore Opener.sln

    - name: Build
      run: dotnet build Opener.sln --configuration Release --no-restore /p:Version=${{ env.PACKAGE_VERSION }}

    - name: Pack
      shell: pwsh
      run: |
        if (Test-Path ./nupkg) {
          Remove-Item ./nupkg -Recurse -Force
        }

        dotnet pack Opener.sln --configuration Release --output ./nupkg --no-build /p:Version=$env:PACKAGE_VERSION

    - name: Push to NuGet
      shell: pwsh
      run: |
        $packages = Get-ChildItem ./nupkg -Filter *.nupkg
        if ($packages.Count -eq 0) {
          throw 'No NuGet packages were found in ./nupkg.'
        }

        foreach ($package in $packages) {
          dotnet nuget push $package.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
        }
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Download Built Binaries
      uses: actions/download-artifact@v4
      with:
        path: ./binaries
        merge-multiple: true

    - name: Generate Checksums
      shell: pwsh
      run: |
        $files = Get-ChildItem ./binaries -File
        $checksums = foreach ($file in $files) {
            $hash = Get-FileHash -Path $file.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($file.Name)"
        }
        [System.IO.File]::WriteAllLines("./binaries/SHA256SUMS", $checksums)

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ env.PACKAGE_VERSION }}
        body_path: release-notes.md
        draft: false
        prerelease: false
        files: |
          ./nupkg/*.nupkg
          ./binaries/*
